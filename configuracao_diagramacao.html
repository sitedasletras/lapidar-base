<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuração da Diagramação — Lapidar Base</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f3f3f3;
margin:0;
}

header{
background:#1a1a1a;
color:white;
padding:25px;
text-align:center;
font-size:24px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:20px;
margin-bottom:8px;
font-weight:bold;
}

select{
width:100%;
padding:14px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
background:white;
}

button{
width:100%;
padding:16px;
font-size:18px;
background:#004aad;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:25px;
}

button:hover{
background:#00337a;
}

.back{
background:#777;
margin-top:15px;
}

.back:hover{
background:#555;
}

footer{
text-align:center;
padding:20px;
color:#666;
font-size:14px;
}

</style>

</head>

<body>

<header>
Configuração da Diagramação
</header>

<div class="container">
<div class="card">

<h2>Definir parâmetros do miolo</h2>

<label>Formato do livro</label>
<select>
<option>A5</option>
<option>16x23 cm</option>
<option>A4</option>
</select>

<label>Fonte do corpo do texto</label>
<select>
<option>Times New Roman</option>
<option>Arial</option>
<option>Garamond</option>
</select>

<label>Margens</label>
<select>
<option>Espelhadas</option>
<option>Simples</option>
</select>

<label>Recuo de parágrafo</label>
<select>
<option>1,25 cm</option>
<option>Sem recuo</option>
</select>

<label>Hifenização</label>
<select>
<option>Automática</option>
<option>Desativada</option>
</select>

<button onclick="location.href='preview_diagramado.html'">
Gerar prévia diagramada
</button>

<button class="back" onclick="location.href='preview_tecnico.html'">
Voltar
</button>

</div>
</div>

<footer>

Lapidar Base — Configuração editorial do miolo

</footer>

</body>
</html>
