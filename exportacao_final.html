<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exportação final</title>

<style>
body{
font-family:Arial;
padding:40px;
}
button{
display:block;
margin:15px 0;
padding:14px;
font-size:18px;
}
</style>

</head>
<body>

<h1>Exportação final</h1>

<button onclick="gerarPDFCapa()">
Gerar PDF capa
</button>

<script>

function gerarPDFCapa(){

const titulo = localStorage.getItem("tituloLivro");
const autor = localStorage.getItem("autorLivro");

const novaJanela = window.open("");

novaJanela.document.write(`
<h1 style="margin-top:40vh;text-align:center">
${titulo}
</h1>

<p style="text-align:center;margin-top:40vh">
${autor}
</p>
`);

}

</script>

</body>
</html>
