<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exportação final</title>

<style>
body{
font-family:Arial, sans-serif;
padding:40px;
background:#f2f2f2;
}

h1{
margin-bottom:30px;
}

button{
display:block;
margin:15px 0;
padding:14px 18px;
font-size:18px;
cursor:pointer;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<h1>Exportação final</h1>

<button onclick="gerarPDFCapa()">
Gerar PDF capa
</button>

<script>
async function gerarPDFCapa(){

const titulo = localStorage.getItem("tituloLivro") || "Título";
const autor = localStorage.getItem("autorLivro") || "Autor";
const subtitulo = localStorage.getItem("subtituloLivro") || "";

const { jsPDF } = window.jspdf;

const doc = new jsPDF({
orientation: "portrait",
unit: "mm",
format: [148, 210]
});

doc.setFont("times", "bold");
doc.setFontSize(22);
doc.text(titulo, 74, 95, { align: "center" });

if(subtitulo){
doc.setFont("times", "normal");
doc.setFontSize(14);
doc.text(subtitulo, 74, 110, { align: "center" });
}

doc.setFont("times", "normal");
doc.setFontSize(14);
doc.text(autor, 74, 170, { align: "center" });

doc.save("capa_lapidar_base.pdf");
}
</script>

</body>
</html>
