<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exportação final</title>

<style>
body{
font-family:Arial;
padding:40px;
text-align:center;
}
button{
margin-top:20px;
padding:14px;
font-size:18px;
}
</style>

</head>
<body>

<h1>Exportação final</h1>

<button onclick="gerarPDFCapa()">
Gerar PDF capa
</button>

<script>

function gerarPDFCapa(){

const titulo = localStorage.getItem("tituloLivro") || "Título";
const autor = localStorage.getItem("autorLivro") || "Autor";

const html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
font-family:serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}
h1{
font-size:42px;
}
p{
font-size:22px;
margin-top:120px;
}
</style>
</head>
<body>

<h1>${titulo}</h1>
<p>${autor}</p>

</body>
</html>
`;

const blob = new Blob([html], {type:"text/html"});
const url = URL.createObjectURL(blob);

window.location.href = url;

}

</script>

</body>
</html>
