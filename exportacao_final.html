<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exportação final</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:40px 30px;
min-height:100vh;
box-sizing:border-box;
}

h1{
font-size:56px;
margin:0 0 30px 0;
}

p{
font-size:18px;
margin-bottom:25px;
}

.botao{
display:block;
width:100%;
padding:18px 20px;
margin-top:18px;
background:#0b3b82;
color:white;
border:none;
font-size:22px;
cursor:pointer;
border-radius:0;
}

.botao:hover{
background:#082c61;
}

.info{
margin-top:30px;
padding:16px;
background:#f7f7f7;
border-left:5px solid #0b3b82;
font-size:16px;
line-height:1.5;
white-space:pre-line;
}
</style>
</head>
<body>

<div class="container">

<h1>Exportação final</h1>

<p>Arquivos prontos para geração:</p>

<button class="botao" onclick="gerarPDFEditorial()">
Gerar PDF editorial
</button>

<button class="botao" onclick="gerarPDFCapaSeparada()">
Gerar PDF capa
</button>

<button class="botao" onclick="gerarPDFMioloSeparado()">
Gerar PDF miolo
</button>

<div class="info" id="status">
Aguardando geração.
</div>

</div>

<script>
function limparHTML(html){
return html
.replace(/<style[\s\S]*?<\/style>/gi, "")
.replace(/<script[\s\S]*?<\/script>/gi, "")
.replace(/<\/(div|h1|h2|h3|h4|h5|h6|p|br|li|ul|ol|section|article)>/gi, "\n")
.replace(/<br\s*\/?>/gi, "\n")
.replace(/<[^>]+>/g, "")
.replace(/\n\s+\n/g, "\n\n")
.replace(/[ \t]+\n/g, "\n")
.trim();
}

function quebrarTexto(doc, texto, largura){
return doc.splitTextToSize(texto, largura);
}

function adicionarMioloAoPDF(doc, textoLimpo){
const margemEsquerda = 18;
const margemSuperior = 22;
const larguraTexto = 112;
const alturaPagina = 210;
const margemInferior = 18;
const alturaUtil = alturaPagina - margemSuperior - margemInferior;

doc.setPage(2);
doc.setFont("times", "normal");
doc.setFontSize(12);

let y = margemSuperior;

const blocos = textoLimpo.split(/\n{2,}/);

for(let i=0; i<blocos.length; i++){
const bloco = blocos[i].trim();

if(!bloco){
continue;
}

const linhas = quebrarTexto(doc, bloco, larguraTexto);
const alturaBloco = linhas.length * 7;

if(y + alturaBloco > margemSuperior + alturaUtil){
doc.addPage([148,210], "portrait");
doc.setFont("times", "normal");
doc.setFontSize(12);
y = margemSuperior;
}

doc.text(linhas, margemEsquerda, y);
y += alturaBloco + 6;
}
}

function gerarPDFEditorial(){
const titulo = localStorage.getItem("tituloLivro") || "Sem título";
const autor = localStorage.getItem("autorLivro") || "Sem autor";
const subtitulo = localStorage.getItem("subtituloLivro") || "";
const htmlMiolo = localStorage.getItem("textoManuscrito") || "";
const textoMiolo = limparHTML(htmlMiolo);

const { jsPDF } = window.jspdf;

const doc = new jsPDF({
orientation: "portrait",
unit: "mm",
format: [148,210]
});

doc.setFont("times", "bold");
doc.setFontSize(22);
doc.text(titulo, 74, 85, {align:"center"});

if(subtitulo){
doc.setFont("times", "normal");
doc.setFontSize(14);
doc.text(subtitulo, 74, 100, {align:"center"});
}

doc.setFont("times", "normal");
doc.setFontSize(14);
doc.text(autor, 74, 170, {align:"center"});

doc.addPage([148,210], "portrait");

if(textoMiolo){
adicionarMioloAoPDF(doc, textoMiolo);
document.getElementById("status").innerText =
"PDF editorial gerado com capa + miolo.";
}else{
doc.setPage(2);
doc.setFont("times", "normal");
doc.setFontSize(12);
doc.text("Miolo indisponível para geração nesta etapa.", 20, 30);
document.getElementById("status").innerText =
"PDF editorial gerado com capa e aviso de miolo indisponível.";
}

doc.save("lapidar_editorial_final.pdf");
}

function gerarPDFCapaSeparada(){
const titulo = localStorage.getItem("tituloLivro") || "Sem título";
const autor = localStorage.getItem("autorLivro") || "Sem autor";
const subtitulo = localStorage.getItem("subtituloLivro") || "";

const { jsPDF } = window.jspdf;

const doc = new jsPDF({
orientation: "portrait",
unit: "mm",
format: [148,210]
});

doc.setFont("times", "bold");
doc.setFontSize(22);
doc.text(titulo, 74, 85, {align:"center"});

if(subtitulo){
doc.setFont("times", "normal");
doc.setFontSize(14);
doc.text(subtitulo, 74, 100, {align:"center"});
}

doc.setFont("times", "normal");
doc.setFontSize(14);
doc.text(autor, 74, 170, {align:"center"});

doc.save("lapidar_capa.pdf");

document.getElementById("status").innerText =
"PDF da capa gerado com sucesso.";
}

function gerarPDFMioloSeparado(){
const htmlMiolo = localStorage.getItem("textoManuscrito") || "";
const textoMiolo = limparHTML(htmlMiolo);

const { jsPDF } = window.jspdf;

const doc = new jsPDF({
orientation: "portrait",
unit: "mm",
format: [148,210]
});

if(textoMiolo){
adicionarMioloAoPDF(doc, textoMiolo);
document.getElementById("status").innerText =
"PDF do miolo gerado com sucesso.";
}else{
doc.setFont("times", "normal");
doc.setFontSize(12);
doc.text("Miolo indisponível para geração nesta etapa.", 20, 30);
document.getElementById("status").innerText =
"PDF do miolo gerado com aviso de indisponibilidade.";
}

doc.save("lapidar_miolo.pdf");
}
</script>

</body>
</html>
