<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKapista — Construção da Capa</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f2f2;
margin:0;
}

header{
background:#1a1a1a;
color:white;
padding:25px;
text-align:center;
font-size:24px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:20px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
font-size:18px;
background:#004aad;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:25px;
}

button:hover{
background:#00337a;
}

.back{
background:#777;
}

.back:hover{
background:#555;
}

footer{
text-align:center;
padding:20px;
color:#666;
font-size:14px;
}
</style>
</head>

<body>

<header>
OKapista — Construção da Capa
</header>

<div class="container">
<div class="card">

<label for="titulo">Título do livro</label>
<input id="titulo" type="text" placeholder="Digite o título">

<label for="autor">Nome do autor</label>
<input id="autor" type="text" placeholder="Digite o nome do autor">

<label for="subtitulo">Subtítulo (opcional)</label>
<input id="subtitulo" type="text" placeholder="Digite o subtítulo">

<label for="contracapa">Texto da contracapa</label>
<input id="contracapa" type="text" placeholder="Digite o texto da contracapa">

<button onclick="salvarCapaEContinuar()">
Gerar capa
</button>

<button class="back" onclick="location.href='preview_diagramado.html'">
Voltar
</button>

</div>
</div>

<footer>
Lapidar Base — OKapista (capa editorial)
</footer>

<script>
function salvarCapaEContinuar(){

const titulo = document.getElementById("titulo").value.trim();
const autor = document.getElementById("autor").value.trim();
const subtitulo = document.getElementById("subtitulo").value.trim();
const contracapa = document.getElementById("contracapa").value.trim();

localStorage.setItem("tituloLivro", titulo);
localStorage.setItem("autorLivro", autor);
localStorage.setItem("subtituloLivro", subtitulo);
localStorage.setItem("textoContracapa", contracapa);

location.href = "exportacao_final.html";
}
</script>

</body>
</html>
