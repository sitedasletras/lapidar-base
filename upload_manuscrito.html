<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selecionar manuscrito</title>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:40px 20px;
}

h1{
font-size:34px;
margin-bottom:30px;
}

input{
margin-bottom:20px;
font-size:18px;
}

button{
padding:14px 18px;
font-size:18px;
}
</style>
</head>

<body>

<h1>Selecionar manuscrito</h1>

<input type="file" id="arquivo" accept=".docx,.txt,.html">

<button onclick="processarArquivo()">Continuar</button>

<script>

async function processarArquivo(){

const input = document.getElementById("arquivo");

if(!input.files.length){
alert("Escolha um arquivo.");
return;
}

const arquivo = input.files[0];

localStorage.setItem("nomeArquivo", arquivo.name);

if(arquivo.name.endsWith(".docx")){

const arrayBuffer = await arquivo.arrayBuffer();

const resultado =
await mammoth.convertToHtml({arrayBuffer});

localStorage.setItem(
"textoManuscrito",
resultado.value
);

window.location.href =
"preview_tecnico.html";

return;

}

const texto =
await arquivo.text();

localStorage.setItem(
"textoManuscrito",
texto
);

window.location.href =
"preview_tecnico.html";

}

</script>

</body>
</html>
