<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecionar manuscrito</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:40px 20px;
}

h1{
font-size:34px;
margin-bottom:30px;
}

input[type="file"]{
display:block;
margin-bottom:20px;
font-size:18px;
}

button{
padding:14px 18px;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>Selecionar manuscrito</h1>

<input type="file" id="arquivo" accept=".txt,.docx,.html,.htm">

<button onclick="processarArquivo()">Continuar</button>

<script>
async function processarArquivo(){

const input = document.getElementById("arquivo");

if(!input.files || !input.files[0]){
alert("Escolha um arquivo primeiro.");
return;
}

const arquivo = input.files[0];
const nome = arquivo.name.toLowerCase();

localStorage.setItem("nomeArquivo", arquivo.name);

if(nome.endsWith(".txt") || nome.endsWith(".html") || nome.endsWith(".htm")){
const texto = await arquivo.text();
localStorage.setItem("textoManuscrito", texto);
window.location.href = "preview_tecnico.html";
return;
}

if(nome.endsWith(".docx")){
alert("DOCX ainda vai para a etapa seguinte, mas a leitura real do conteúdo entra no próximo ajuste.");
localStorage.setItem("textoManuscrito", "");
window.location.href = "preview_tecnico.html";
return;
}

alert("Formato ainda não suportado nesta etapa.");
}
</script>

</body>
</html>
